name: build and package to app

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  build-and-package:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release]
        # Include specific compiler pairings for each OS
        include:
          - os: windows-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++

    steps:
    - name: Checkout repo
      uses: actions/checkout@v6.0.2
      
    #install Qt
    #this program uses new syntaxes which breaks Qt versions < 6.3.0
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.3.0'
        arch: ${{ runner.os == 'Windows' && 'win64_mingw' || '' }}

    #vulkan
    - name: Setup Vulkan SDK
      uses: humbletim/setup-vulkan-sdk@v1.2.1
      with:
        vulkan-query-version: 'latest'
        vulkan-components: 'Vulkan-Headers, Vulkan-Loader'
        vulkan-use-cache: true
  
    #unix dependencies
    - name: Install Dependencies
      run: |
        if [ "$RUNNER_OS" == "Linux" ]; then
          sudo apt-get update
          sudo apt-get install -y libmpv-dev
        elif [ "$RUNNER_OS" == "macOS" ]; then
          brew update
          brew install mpv
        fi
      shell: bash

    #windows
    - name: Install MinGW (Windows)
      if: runner.os == 'Windows'
      uses: msys2/setup-msys2@v2
      with:
        update: true
        install: mingw-w64-x86_64-gcc mingw-w64-x86_64-cmake mingw-w64-x86_64-pkg-config

    - name: Add MinGW to path (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: echo "C:/msys64/mingw64/bin" >> $GITHUB_PATH

    # Windows: libmpv
    - name: Install libmpv (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        VERSION="mpv-dev-x86_64-v3-20260412-git-062f4bf.7z"
        echo "Downloading libmpv..."
        curl -L -o libmpv.7z "https://sourceforge.net/projects/mpv-player-windows/files/libmpv/${VERSION}/download"
        echo "Extracting..."
        7z x libmpv.7z -o./mpv
        echo "$(pwd)/mpv" >> $GITHUB_PATH
        echo "LIBMPV_PATH=$(pwd -W)/mpv" >> $GITHUB_ENV
        
    # Configure
    - name: Configure CMake
      shell: bash
      run: |
        WORKSPACE=$(cygpath -u "${{ github.workspace }}" 2>/dev/null || echo "${{ github.workspace }}")
        GENERATOR="Unix Makefiles"
        if [ "$RUNNER_OS" == "Windows" ]; then
          GENERATOR="MinGW Makefiles"
        fi
        cmake -B "${{ github.workspace }}/build" \
          -G "$GENERATOR" \
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }} \
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DLIBMPV_PATH="${LIBMPV_PATH:-}" \
          -S "${{ github.workspace }}"

    - name: Build
      shell: bash
      run: | 
        BUILD_DIR=$(cygpath -u "${{ github.workspace }}" 2>/dev/null || echo "${{ github.workspace }}")/build
        cmake --build "$BUILD_DIR" --config ${{ matrix.build_type }}
        
    - name: Test
      working-directory: ${{ github.workspace }}/build
      shell: bash
      run: ctest --build-config ${{ matrix.build_type }}

    - name: Package (Linux AppImage)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        # Download linuxdeploy + Qt plugin
          curl -L -o linuxdeploy https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -L -o linuxdeploy-plugin-qt https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy linuxdeploy-plugin-qt
  
          #app dir structure
          mkdir -p AppDir/usr/bin
          cp build/mini_timeline_scroll AppDir/usr/bin/
  
          # desktop and icon
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cat > AppDir/usr/share/applications/mini_timeline_scroll.desktop << EOF
          [Desktop Entry]
          Name=Mini Timeline Scroll
          Exec=mini_timeline_scroll
          Icon=mini_timeline_scroll
          Type=Application
          Categories=Utility;
          EOF
          convert -size 256x256 xc:transparent AppDir/usr/share/icons/hicolor/256x256/apps/mini_timeline_scroll.png 2>/dev/null || \
            curl -L -o AppDir/usr/share/icons/hicolor/256x256/apps/mini_timeline_scroll.png \
            "https://raw.githubusercontent.com/encharm/Font-Awesome-SVG-PNG/master/black/png/256/file-o.png"
  
          QMAKE=$(which qmake6 || which qmake)
          OUTPUT=mini_timeline_scroll-linux.AppImage \
          ./linuxdeploy --appdir AppDir \
            --plugin qt \
            --output appimage \
            -e build/mini_timeline_scroll \
            --executable build/mini_timeline_scroll

    # windows zip
    - name: Package (Windows ZIP)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        BUILD_DIR=$(cygpath -u "$GITHUB_WORKSPACE")/build
        mkdir -p release

        # Copy binary
        cp "${BUILD_DIR}/mini_timeline_scroll.exe" release/

        # Bundle Qt DLLs
        WINDEPLOYQT=$(cygpath -u "$QT_ROOT_DIR")/bin/windeployqt.exe
        "$WINDEPLOYQT" --release release/mini_timeline_scroll.exe

        # Copy mpv DLL
        cp mpv/libmpv-2.dll release/

        # Zip it up
        7z a mini_timeline_scroll-windows.zip ./release/*

    - name: Convert icon to icns (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        mkdir -p mini_timeline_icon.iconset
        sips -z 16 16     assets/mini_timeline_icon.png --out mini_timeline_icon.iconset/icon_16x16.png
        sips -z 32 32     assets/mini_timeline_icon.png --out mini_timeline_icon.iconset/icon_16x16@2x.png
        sips -z 32 32     assets/mini_timeline_icon.png --out mini_timeline_icon.iconset/icon_32x32.png
        sips -z 64 64     assets/mini_timeline_icon.png --out mini_timeline_icon.iconset/icon_32x32@2x.png
        sips -z 128 128   assets/mini_timeline_icon.png --out mini_timeline_icon.iconset/icon_128x128.png
        sips -z 256 256   assets/mini_timeline_icon.png --out mini_timeline_icon.iconset/icon_128x128@2x.png
        sips -z 256 256   assets/mini_timeline_icon.png --out mini_timeline_icon.iconset/icon_256x256.png
        sips -z 512 512   assets/mini_timeline_icon.png --out mini_timeline_icon.iconset/icon_256x256@2x.png
        sips -z 512 512   assets/mini_timeline_icon.png --out mini_timeline_icon.iconset/icon_512x512.png
        iconutil -c icns mini_timeline_icon.iconset -o assets/mini_timeline_icon.icns
    
    #dmg
    - name: Package (macOS DMG)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        # Bundle Qt into .app
        MACDEPLOYQT=$(find $QT_ROOT_DIR -name macdeployqt | head -1)
        "$MACDEPLOYQT" build/mini_timeline_scroll.app -dmg

        mv build/mini_timeline_scroll.dmg mini_timeline_scroll-macos.dmg

    #upload
    - name: Upload Artifact (Linux)
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v7.0.1
      with:
        name: linux-appimage
        path: mini_timeline_scroll-linux.AppImage

    - name: Upload Artifact (Windows)
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v7.0.1
      with:
        name: windows-zip
        path: mini_timeline_scroll-windows.zip

    - name: Upload Artifact (macOS)
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v7.0.1
      with:
        name: macos-dmg
        path: mini_timeline_scroll-macos.dmg

  # release
  release:
    needs: build-and-package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v8.0.1
      with:
        path: artifacts

    - name: Publish rolling latest release
      uses: softprops/action-gh-release@v3.0.0
      with:
        tag_name: latest
        name: Latest Build
        prerelease: true
        make_latest: true
        body: |
          Automated rolling release from the latest commit on main.
          Built on ${{ github.run_id }} — ${{ github.sha }}
        files: |
          artifacts/linux-appimage/mini_timeline_scroll-linux.AppImage
          artifacts/windows-zip/mini_timeline_scroll-windows.zip
          artifacts/macos-dmg/mini_timeline_scroll-macos.dmg
